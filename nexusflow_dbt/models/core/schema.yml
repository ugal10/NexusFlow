version: 2

models:
  - name: dim_customer
    description: "SCD Type 2 customer dimension built from dbt snapshot. 1500 rows = 500 customers x 3 batches."
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NA', 'EMEA', 'APAC']
      - name: is_current
        tests:
          - not_null
      - name: customer_sk
        tests:
          - not_null
          # not unique by design - dbt snapshot hash repeats across batch runs
          # 500 customers x 3 batches = 1500 rows expected

  - name: dim_plan
    description: "Plan reference data."
    columns:
      - name: plan_id
        tests:
          - not_null
          - unique

  - name: dim_date
    description: "Date spine 2024-01-01 to 2024-12-31."
    columns:
      - name: date_day
        tests:
          - not_null
          - unique

  - name: fct_subscriptions
    description: "One row per subscription per batch."
    columns:
      - name: subscription_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: mrr
        tests:
          - not_null

  - name: fct_invoices
    description: "One row per invoice enriched with region."
    columns:
      - name: invoice_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: fct_payments
    description: "One row per payment transaction."
    columns:
      - name: payment_id
        tests:
          - not_null

  - name: fct_mrr_movements
    description: "MRR movements between batches - new, expansion, contraction, churn."
    columns:
      - name: customer_id
        tests:
          - not_null
      - name: movement_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['new', 'expansion', 'contraction', 'churn']